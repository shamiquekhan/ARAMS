version: "3.9"

services:
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [postgres, redis, qdrant]
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery worker --loglevel=info --concurrency=4
    env_file: .env
    depends_on: [redis, postgres, qdrant]
    volumes:
      - ./backend:/app

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: amars
      POSTGRES_USER: amars
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amars}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrantdata:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollamadata:/root/.ollama

volumes:
  pgdata:
  qdrantdata:
  ollamadata:
